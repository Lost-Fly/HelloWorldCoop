# Telegram Bot Configuration
# These properties can be overridden by system properties or environment variables

# Set your bot token here (get it from @BotFather on Telegram)
# For security, it's recommended to set this via environment variable: BOT_TOKEN
bot.token=YOUR_BOT_TOKEN_HERE

# Set your bot username here (without the @ symbol)
# For security, it's recommended to set this via environment variable: BOT_USERNAME
bot.username=YourBotUsername

# Logging configuration
org.slf4j.simpleLogger.defaultLogLevel=INFO
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss